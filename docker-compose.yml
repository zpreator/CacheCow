services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8501}:8501"
    volumes:
      - cachecow-data:/app/data
      - ${DOWNLOAD_PATH:-/tmp/cachecow}:${DOWNLOAD_PATH:-/tmp/cachecow}
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=${TZ:-UTC}
    env_file:
      - path: .env
        required: false
    restart: unless-stopped

volumes:
  cachecow-data:

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CacheCow</title>
    <link rel="icon" type="image/x-icon" href="/static/cow-head.ico">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body hx-boost="true">
    <div class="layout">
        <aside class="sidebar">
            <header>
                <h2 style="display:flex;align-items:center;gap:0.5rem;">
                    <img src="/static/cow-head.png" alt="" style="width:1.5rem;height:1.5rem;object-fit:contain;">
                    CacheCow
                </h2>
            </header>
            <ul>
                <li><a href="/" {% if active_page == "library" %}class="active"{% endif %}>Library</a></li>
                <li><a href="/discover" {% if active_page == "discover" %}class="active"{% endif %}>Discover</a></li>
                <li><a href="/queue" {% if active_page == "queue" %}class="active"{% endif %}>Queue</a></li>
                <li><a href="/channels" {% if active_page == "channels" %}class="active"{% endif %}>Channels</a></li>
                <li><a href="/settings" {% if active_page == "settings" %}class="active"{% endif %}>Settings</a></li>
                <li><a href="/logs" {% if active_page == "logs" %}class="active"{% endif %}>Logs</a></li>
            </ul>
            <footer>
                <form action="/logout" method="post">
                    <button type="submit" class="outline secondary">Logout</button>
                </form>
            </footer>
        </aside>
        <main class="content">
            <div id="toast-container"></div>
            {% if download_path_missing() %}
            <div style="background:color-mix(in srgb,var(--pico-color-amber-500) 15%,transparent);
                        border:1px solid var(--pico-color-amber-500);border-radius:var(--pico-border-radius);
                        padding:0.6rem 1rem;margin-bottom:1.25rem;font-size:0.875rem;display:flex;
                        align-items:center;justify-content:space-between;gap:1rem;">
                <span>⚠ No download path set. Downloads will fail until you configure one.</span>
                <a href="/settings" style="white-space:nowrap;font-weight:600;">Go to Settings →</a>
            </div>
            {% endif %}
            {% block content %}{% endblock %}
        </main>
    </div>
    <script>
        /* Stop any playing video/audio before HTMX swaps page content */
        if (!window._videoCleanupReady) {
            window._videoCleanupReady = true;
            document.body.addEventListener("htmx:beforeSwap", function() {
                var v = document.querySelector('video');
                if (v) { v.pause(); v.removeAttribute('src'); v.load(); }
                var a = document.querySelector('audio');
                if (a) { a.pause(); a.removeAttribute('src'); a.load(); }
            });
        }
        if (!window._toastReady) {
            window._toastReady = true;
            document.body.addEventListener("showToast", function(evt) {
                const container = document.getElementById("toast-container");
                const toast = document.createElement("div");
                toast.className = "toast";
                toast.textContent = evt.detail.value || evt.detail;
                container.appendChild(toast);
                setTimeout(() => { toast.classList.add("show"); }, 10);
                setTimeout(() => {
                    toast.classList.remove("show");
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            });
        }
    </script>
</body>
</html>

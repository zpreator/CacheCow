<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CacheCow</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body hx-boost="true">
    <div class="layout">
        <aside class="sidebar">
            <header>
                <h2>CacheCow</h2>
            </header>
            <ul>
                <li><a href="/" {% if active_page == "home" %}class="active"{% endif %}>Dashboard</a></li>
                <li><a href="/channels" {% if active_page == "channels" %}class="active"{% endif %}>Subscriptions</a></li>
                <li><a href="/channels/add" {% if active_page == "add_channel" %}class="active"{% endif %}>Add Channel</a></li>
                <li><a href="/tags" {% if active_page == "tags" %}class="active"{% endif %}>Manage Tags</a></li>
                <li><a href="/settings" {% if active_page == "settings" %}class="active"{% endif %}>Settings</a></li>
                <li><a href="/history" {% if active_page == "history" %}class="active"{% endif %}>History</a></li>
                <li><a href="/logs" {% if active_page == "logs" %}class="active"{% endif %}>Logs</a></li>
            </ul>
            <footer>
                <form action="/logout" method="post">
                    <button type="submit" class="outline secondary">Logout</button>
                </form>
            </footer>
        </aside>
        <main class="content">
            <div id="toast-container"></div>
            {% block content %}{% endblock %}
        </main>
    </div>
    <script>
        document.body.addEventListener("showToast", function(evt) {
            const container = document.getElementById("toast-container");
            const toast = document.createElement("div");
            toast.className = "toast";
            toast.textContent = evt.detail.value || evt.detail;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.add("show"); }, 10);
            setTimeout(() => {
                toast.classList.remove("show");
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        });
    </script>
</body>
</html>

<div class="channel-card">
    {% if channel.image %}
    <img src="{{ channel.image }}" alt="{{ channel.name }}">
    {% else %}
    <div class="placeholder-img">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
    </div>
    {% endif %}
    <div class="channel-info">
        <h4>{{ channel.name }}</h4>
        <small>{{ channel.tag.name }}
            {% if channel.use_global_settings %} &middot; Global settings{% endif %}
            {% if channel.download_all %} &middot; Download all{% endif %}
        </small>
    </div>
    <div class="channel-actions">
        <button class="outline"
                hx-get="/channels/{{ channel.id }}/edit"
                hx-target="#channel-{{ channel.id }}"
                hx-swap="innerHTML">Edit</button>
        <button class="outline secondary"
                hx-post="/downloads/channel/{{ channel.id }}"
                hx-swap="none">Download Now</button>
    </div>
</div>
